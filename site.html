<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Roube um Brainrot - Checkout Mercado Pago</title>

  <!-- SDK Mercado Pago (frontend) -->
  <script src="https://sdk.mercadopago.com/js/v2"></script>

  <style>
    :root{
      --card-bg: rgba(0,0,0,0.55);
      --accent: #ffd166;
      --text: #f1f1f1;
      --muted: #d7d7d7;
      --glass: rgba(255,255,255,0.04);
      --radius: 14px;
      --gap: 14px;
    }

    html,body{
      height:100%;
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: url("https://i.postimg.cc/YhysR3T5/Screenshot-2025-08-29-14-35-04-334-com-roblox-client.jpg") center/cover no-repeat fixed;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:var(--text);
    }

    .overlay{
      position:fixed;
      inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.45));
      z-index:0;
    }

    .container{
      position:relative;
      z-index:1;
      max-width:1100px;
      margin:28px auto;
      padding:20px;
      display:flex;
      gap:var(--gap);
      flex-direction:column;
      align-items:stretch;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .brand{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .logo{
      width:54px;
      height:54px;
      border-radius:12px;
      background:linear-gradient(135deg,#ffffff22,#00000011);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      color:var(--text);
      font-size:18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }

    h1{ margin:0; font-size:20px; letter-spacing:0.4px; }

    .subtitle { color:var(--muted); font-size:13px; }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap:16px;
    }

    .card{
      background: var(--card-bg);
      border-radius: var(--radius);
      padding:12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.45);
      display:flex;
      flex-direction:column;
      gap:8px;
      transition: transform .12s ease, box-shadow .12s ease;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .card:hover{ transform: translateY(-6px); box-shadow: 0 18px 40px rgba(0,0,0,0.6); }

    .item-title{
      font-weight:700;
      font-size:15px;
      text-align:center;
      margin-bottom:4px;
    }

    .thumb{
      width:100%;
      height:160px;
      border-radius:10px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--glass);
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .price-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }

    .price{
      font-weight:800;
      color:var(--accent);
      font-size:18px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-top:6px;
    }

    .field label{
      font-size:12px;
      color:var(--muted);
    }

    .field input{
      padding:8px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.06);
      background:rgba(255,255,255,0.02);
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    .buy-row{
      display:flex;
      gap:8px;
      align-items:center;
      margin-top:8px;
    }

    .btn{
      padding:10px 12px;
      border-radius:10px;
      border:0;
      cursor:pointer;
      font-weight:700;
      background: linear-gradient(90deg,#ffb86b,#ff8a00);
      color:#111;
      flex:1;
      box-shadow: 0 8px 24px rgba(255,130,0,0.12);
      transition: background-color 0.2s ease;
    }
    .btn:hover {
      background: linear-gradient(90deg,#ffa54d,#e67e22);
    }

    .btn.secondary{
      background:transparent;
      border:1px solid rgba(255,255,255,0.06);
      color:var(--text);
      font-weight:600;
      flex:0;
      padding:9px 10px;
    }

    footer{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
      position: relative;
    }

    .micro-text {
      font-size: 7px;
      color: rgba(255, 255, 255, 0.1);
      user-select: none;
      pointer-events: none;
      margin-top: 8px;
    }

    @media (max-width:520px){
      .thumb{ height:140px; }
      .container{ padding:12px; margin:12px; }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="container">
    <header>
      <div class="brand">
        <div class="logo">LOJA</div>
        <div>
          <h1>Roube um Brainrot</h1>
          <div class="subtitle">Clique em Comprar para abrir o checkout</div>
        </div>
      </div>
      <div>
        <div style="font-size:13px;color:var(--muted);text-align:right">Testar com sandbox / credenciais de teste</div>
      </div>
    </header>

    <main>
      <div class="grid" id="grid"></div>
    </main>

    <footer>
      Proteja sua Access Token — ela só deve ficar no backend (Replit).
      <div class="micro-text">esse site é de mentira</div>
    </footer>
  </div>

  <script>
    const BACKEND_URL = "https://SEU-PROJETO.repl.co/pagar"; // troque para seu backend
    const MP_PUBLIC_KEY = "APP_USR-90716ab5-f96e-47af-a396-b86b5d6453da"; // sua public key

    const items = [
      { title: "TRALALERO TRALALA", price: "2,99", img: "https://i.postimg.cc/FdHMNzVx/Screenshot-2025-08-21-23-47-50-396-com-whatsapp.jpg" },
      { title: "LA VACA SATURNO SATURNITA", price: "4,99", img: "https://i.postimg.cc/62bD3KHx/Screenshot-2025-08-21-23-47-52-353-com-whatsapp.jpg" },
      { title: "job job sahur", price: "6,99", img: "https://i.postimg.cc/XG5pXQd9/IMG-20250829-WA0084.jpg" },
      { title: "sammyni spiderini", price: "5,00", img: "https://i.postimg.cc/GTJtxtM2/IMG-20250829-WA0085.jpg" },
      { title: "chicletera bicicletera", price: "10,00", img: "https://i.postimg.cc/WDF4fX9x/IMG-20250829-WA0086.jpg" },
      { title: "dragão canelore", price: "25,00", img: "https://i.postimg.cc/CnYL5YFV/IMG-20250829-WA0087.jpg" },
      { title: "Nyan cat", price: "1,00", img: "https://i.postimg.cc/LJhf2kC3/IMG-20250829-WA0088.jpg" },
      { title: "orcalero orcala", price: "1,00", img: "https://i.postimg.cc/Kk54n4pY/IMG-20250829-WA0089.jpg" },
      { title: "Los hotspots", price: "12,99", img: "https://i.postimg.cc/1fX4qmG9/IMG-20250829-WA0090.jpg" },
      { title: "Udin din Din dun madin Din dun", price: "0,50", img: "https://i.postimg.cc/jW0jmyG5/IMG-20250829-WA0091.jpg" },
      { title: "Las tralaleritas", price: "10,00", img: "https://i.postimg.cc/ZBqzMRKn/IMG-20250829-WA0092.jpg" },
      { title: "Los orcaleritos", price: "6,99", img: "https://i.postimg.cc/tnZQ9M6H/IMG-20250829-WA0093.jpg" },
      { title: "Los tralaleritos", price: "7,99", img: "https://i.postimg.cc/z36YxqmD/IMG-20250829-WA0094.jpg" }
    ];

    const grid = document.getElementById('grid');

    function sanitizeNumber(str){
      if(typeof str !== "string") return Number(str) || 0;
      return Number(str.replace(/\./g,'').replace(',','.')) || 0;
    }

    // Renderizar os cards dos produtos
    items.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="item-title">${item.title}</div>
        <a href="${item.img}" target="_blank" class="thumb" aria-label="Imagem de ${item.title}">
          <img src="${item.img}" alt="${item.title}">
        </a>

        <div class="price-row">
          <div style="font-size:13px;color:var(--muted)">Preço</div>
          <div class="price">R$ ${item.price}</div>
        </div>

        <div class="field">
          <label for="nick_${idx}">Nick <span style="color:#ff6b6b;">*</span></label>
          <input id="nick_${idx}" type="text" placeholder="Nick no jogo" required>
        </div>

        <div class="buy-row">
          <button class="btn" type="button">Comprar</button>
        </div>
      `;

      // Botão comprar com evento
      const btn = card.querySelector('.btn');
      const inputNick = card.querySelector('input');

      btn.addEventListener('click', async () => {
        const nick = inputNick.value.trim();
        if (!nick) {
          alert('Por favor, preencha seu Nick.');
          inputNick.focus();
          return;
        }

        // Prepara os dados para enviar
        const precoNum = sanitizeNumber(item.price);

        try {
          btn.disabled = true;
          btn.textContent = 'Carregando...';

          const response = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              title: item.title,
              price: precoNum,
              nick: nick,
              img: item.img
            })
          });

          if (!response.ok) throw new Error('Erro na requisição');

          const data = await response.json();
          if (!data.init_point) throw new Error('Link de pagamento não disponível');

          window.open(data.init_point, '_blank');

        } catch (error) {
          alert('Erro ao iniciar o pagamento: ' + error.message);
          console.error(error);
        } finally {
          btn.disabled = false;
          btn.textContent = 'Comprar';
        }
      });

      grid.appendChild(card);
    });
  </script>
</body>
</html>
